// ===== SUPABASE HELPER =====
function createClient(url, key) {
  const hdrs = { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation" };
  return {
    async get(k) {
      const r = await fetch(`${url}/rest/v1/trip_data?key=eq.${k}&select=value,updated_at`, { headers: hdrs });
      const d = await r.json();
      return d[0] || null;
    },
    async set(k, v) {
      const r = await fetch(`${url}/rest/v1/trip_data`, {
        method: "POST", headers: { ...hdrs, Prefer: "return=representation,resolution=merge-duplicates" },
        body: JSON.stringify({ key: k, value: v, updated_at: new Date().toISOString() })
      });
      return r.ok;
    },
    async getUpdatedAt(k) {
      const r = await fetch(`${url}/rest/v1/trip_data?key=eq.${k}&select=updated_at`, { headers: hdrs });
      const d = await r.json();
      return d[0]?.updated_at || null;
    }
  };
}

  const addCal = (item, day, time) => { setCal(p=>({...p,[`${day}-${time}`]:{...item,day,time}})); setSched(null); };

  const isSch = (id) => Object.values(cal).some(e=>e.id===id);
  const schInfo = (id) => { const e=Object.values(cal).find(e=>e.id===id); if(!e) return null; const dayLabel=DAYS.find(d=>d.key===e.day)?.short; const timeLabel=e.time==="lunch"?"Lunch":e.time==="dinner"?"Dinner":e.time; return `${dayLabel} @ ${timeLabel}`; };
  const addItem = (cat) => {
    if(!addF.name.trim()) return;
    const item = {id:`${cat[0]}${Date.now()}`,name:addF.name.trim(),hours:addF.hours,area:addF.area,duration:parseInt(addF.duration)||60,desc:addF.desc,tip:addF.tip,closed:addF.closed||"",lat:addF.lat||48.856,lng:addF.lng||2.35};
    if(cat==="museum") setMuseums(p=>[...p,item]); else if(cat==="wwii") setWwii(p=>[...p,item]); else setMisc(p=>[...p,{...item,icon:addF.icon||"📌"}]);
    setAddF({name:"",hours:"",area:"",duration:"60",desc:"",tip:"",icon:""}); setAddOpen(false);
  };
  const findItem = async (cat) => {
    if (!addF.name.trim()) return;
    const result = await lookupPlace(addF.name, cat);
    if (result) {
      setAddF(p => ({...p, name:result.name||p.name, hours:result.hours||"", area:result.area||"", duration:String(result.duration||60), desc:result.desc||"", tip:result.tip||"", closed:result.closed||"", lat:result.lat||48.856, lng:result.lng||2.35}));
    }
  };
  const addRest = () => {
    if(!restF.name.trim()) return;
    setRestaurants(p=>[...p,{id:`r${Date.now()}`,name:restF.name.trim(),meal:restF.meal||"dinner",hours:restF.hours||"",area:restF.area||"",phone:restF.phone||"",duration:parseInt(restF.duration)||(restF.meal==="brunch"?90:restF.meal==="lunch"?90:120),desc:restF.desc||"",tip:restF.tip||"",lat:restF.lat||48.856,lng:restF.lng||2.352}]);
    setRestF({name:"",meal:"dinner"});
  };
  const findRest = async () => {
    if (!restF.name.trim()) return;
    const result = await lookupPlace(restF.name, "restaurant");
    if (result) {
      setRestF(p => ({...p, name:result.name||p.name, hours:result.hours||"", area:result.area||"", phone:result.phone||"", desc:result.desc||"", tip:result.tip||"", meal:result.meal||p.meal, duration:String(result.duration||90), lat:result.lat||48.856, lng:result.lng||2.352}));
    }
  };
  const rmItem = (id, cat) => {
    const fn = cat==="museum"?setMuseums:cat==="wwii"?setWwii:cat==="misc"?setMisc:setRestaurants;
    fn(p=>p.filter(i=>i.id!==id));
    setCal(p=>{ const c={...p}; Object.keys(c).forEach(k=>{ if(c[k].id===id) delete c[k]; }); return c; });
  };
  const saveEdit = (id, cat) => {
    const fn = cat==="museum"?setMuseums:cat==="wwii"?setWwii:cat==="misc"?setMisc:setRestaurants;
    fn(p=>p.map(i=>i.id===id?{...i,...editD}:i)); setEditId(null); setEditD({});
  };
  const toggleMeal = (id) => {
    const cycle = {dinner:"lunch",lunch:"brunch",brunch:"dinner"};
    setRestaurants(p=>p.map(r=>r.id===id?{...r,meal:cycle[r.meal]||"dinner"}:r));
  };
  const genGroups = () => {
    const items = groupSel.map(id=>allItems.find(i=>i.id===id)).filter(Boolean);
    if(items.length<2) return;
    const groups=[]; const used=new Set();
    items.forEach(item=>{ if(used.has(item.id)) return; const g=[item]; used.add(item.id);
      items.forEach(o=>{ if(!used.has(o.id)&&item.lat&&o.lat&&Math.sqrt((item.lat-o.lat)**2+(item.lng-o.lng)**2)<0.012){ g.push(o); used.add(o.id); } });
      groups.push(g); });
    groups.sort((a,b)=>b.length-a.length);
    setGroupResult(groups.slice(0,DAYS.length).map((g,i)=>({day:DAYS[i],items:g})));
  };
  const applyGroups = () => {
    if(!groupResult) return; const ne={...cal};
    groupResult.forEach(dg=>{ let ti=1; dg.items.forEach(item=>{ if(ti<TIMES.length){ ne[`${dg.day.key}-${TIMES[ti]}`]={...item,day:dg.day.key,time:TIMES[ti]}; ti+=Math.ceil((item.duration||60)/60); } }); });
    setCal(ne); setGroupOpen(false); setGroupResult(null); setGroupSel([]); setPage("calendar");
  };
  const ec = Object.keys(cal).length;
  const fmtDur = (d) => d>=60?`${Math.floor(d/60)}h${d%60?` ${d%60}m`:""}`:d+"min";
  const updFlight = (fid,field,val) => setFlights(p=>p.map(f=>f.id===fid?{...f,[field]:val}:f));
  const updTrans = (tid,field,val) => setTransport(p=>p.map(t=>t.id===tid?{...t,[field]:val}:t));

  // ===== VOTING =====
  const toggleVote = (itemId) => {
    if (!me) { setShowWho(true); return; }
    setVotes(p => {
      const cur = p[itemId] || [];
      return { ...p, [itemId]: cur.includes(me) ? cur.filter(n=>n!==me) : [...cur, me] };
    });
  };
  const getVotes = (itemId) => votes[itemId] || [];
  const myVote = (itemId) => me && (votes[itemId] || []).includes(me);
  const pickMe = (name) => { setMe(name); localStorage.setItem("paris_me", name); setShowWho(false); };

  // ===== PRIORITIES =====
  const PRI = {must:{label:"Must Do",icon:"🔥",color:"#E07A5F",sort:1},want:{label:"Want To",icon:"⭐",color:"#F2CC8F",sort:2},iftime:{label:"If Time",icon:"💭",color:"#7B8CDE",sort:3}};
  const getPri = (id) => priorities[id] || null;
  const cyclePri = (id) => {
    setPriorities(p => {
      const cur = p[id];
      if (!cur) return {...p, [id]:"must"};
      if (cur==="must") return {...p, [id]:"want"};
      if (cur==="want") return {...p, [id]:"iftime"};
      const n = {...p}; delete n[id]; return n;
    });
  };
  const PriBadge = ({id, small}) => {
    const pri = getPri(id);
    if (!pri) return <span onClick={e=>{e.stopPropagation();cyclePri(id);}} style={{fontFamily:"'DM Sans',sans-serif",fontSize:small?10:12,color:"#555",cursor:"pointer",padding:small?"3px 8px":"5px 12px",borderRadius:10,border:"1px solid #333",whiteSpace:"nowrap"}}>Rank</span>;
    const p = PRI[pri];
    return <span onClick={e=>{e.stopPropagation();cyclePri(id);}} style={{fontFamily:"'DM Sans',sans-serif",fontSize:small?10:12,fontWeight:600,color:p.color,cursor:"pointer",padding:small?"3px 8px":"5px 12px",borderRadius:10,background:`${p.color}18`,border:`1px solid ${p.color}33`,whiteSpace:"nowrap"}} title="Click to cycle: Must Do → Want To → If Time → Clear">{p.icon} {p.label}</span>;
  };

  // ===== AI LOOKUP =====
  const [lookErr, setLookErr] = useState("");
  const lookupPlace = async (name, type) => {
    if (!name.trim()) return null;
    setLooking(true);
    setLookErr("");
    try {
      const r = await fetch(`${SB_URL}/functions/v1/bright-processor`, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${SB_KEY}`},
        body:JSON.stringify({name: name.trim(), type})
      });
      if (!r.ok) { setLookErr(`Error: ${r.status} ${r.statusText}`); setLooking(false); return null; }
      const data = await r.json();
      if (data.error) { setLookErr(`Error: ${data.error.message||JSON.stringify(data.error)}`); setLooking(false); return null; }
      const text = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("") || "";
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        setLooking(false);
        return parsed;
      }
      setLookErr("Couldn't parse response. Try again.");
    } catch(e) { setLookErr(`Error: ${e.message}`); }
    setLooking(false);
    return null;
  };
  const fmtSync = () => { if(!lastSync) return null; const s=Math.floor((Date.now()-lastSync.getTime())/1000); return s<5?"Synced ✓":s<60?`Synced ${s}s ago`:`Synced ${Math.floor(s/60)}m ago`; };

  const shareRankings = (items, catLabel) => {
    const priSort = (id) => { const p=getPri(id); return p?PRI[p].sort:4; };
    const sorted = [...items].sort((a,b)=>{
      const pa=priSort(a.id), pb=priSort(b.id);
      if(pa!==pb) return pa-pb;
      return (getVotes(b.id).length)-(getVotes(a.id).length);
    });
    const mustDo = sorted.filter(i=>getPri(i.id)==="must");
    const wantTo = sorted.filter(i=>getPri(i.id)==="want");
    const ifTime = sorted.filter(i=>getPri(i.id)==="iftime");
    const unranked = sorted.filter(i=>!getPri(i.id) && getVotes(i.id).length>0);

    const fmtItem = (item,i) => {
      const area = item.area ? ` — ${item.area}` : "";
      return `  ${i+1}. ${item.name}${area}`;
    };

    let body = `🗼 Paris Trip — ${catLabel} Rankings\n`;
    body += `Grandma's 80th Birthday · May 29 – Jun 2, 2026\n\n`;
    if(mustDo.length) { body += `🔥 MUST DO\n${mustDo.map(fmtItem).join("\n")}\n\n`; }
    if(wantTo.length) { body += `⭐ WANT TO\n${wantTo.map(fmtItem).join("\n")}\n\n`; }
    if(ifTime.length) { body += `💭 IF TIME\n${ifTime.map(fmtItem).join("\n")}\n\n`; }
    if(unranked.length) { body += `👍 VOTED BUT UNRANKED\n${unranked.map(fmtItem).join("\n")}\n\n`; }
    if(!mustDo.length && !wantTo.length && !ifTime.length && !unranked.length) { body += "No rankings yet! Open the trip planner to vote and rank.\n\n"; }
    body += `View full trip: https://benfischman71.github.io/paris-2026/`;

    const subject = encodeURIComponent(`Paris Trip — ${catLabel} Rankings`);
    const mailBody = encodeURIComponent(body);
    window.open(`mailto:?subject=${subject}&body=${mailBody}`, "_self");
  };
  const [,forceRender] = useState(0);
  useEffect(() => { const t=setInterval(()=>forceRender(n=>n+1),10000); return ()=>clearInterval(t); }, []);


  const renderCards = (items, cat) => (
    <div className="grid-cards">
      {items.map(item => {
        const cc=CC[cat]; const sc=isSch(item.id); const si=schInfo(item.id);
        return (
          <div key={item.id} onClick={()=>setSel({...item,category:cat})} style={{background:"#141414",border:"1px solid #222",borderRadius:12,padding:14,cursor:"pointer",borderLeft:`3px solid ${cc.accent}`,transition:"all 0.2s",position:"relative"}}>
            {item.travel && (<div style={{background:"#F97316",color:"#fff",fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:600,padding:"4px 10px",borderRadius:"0 0 8px 8px",position:"absolute",top:0,right:14,letterSpacing:"0.3px",boxShadow:"0 2px 8px rgba(249,115,22,0.3)"}}>{item.travel}</div>)}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,marginTop:item.travel?20:0}}>
              <h3 style={{fontSize:15,fontWeight:600,lineHeight:1.3,flex:1,paddingRight:6}}>{item.icon?<span style={{marginRight:4}}>{item.icon}</span>:null}{item.name}</h3>
              {item.area && <Tag color={cc.accent}>{item.area}</Tag>}
            </div>
            {item.hours && <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#777",marginBottom:2}}>{item.hours}</p>}
            {item.closed && item.closed!=="None" && <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#E07A5F"}}>Closed: {item.closed}</p>}
            {item.desc && <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#888",marginTop:4,lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{item.desc}</p>}
            {getVotes(item.id).length>0 && <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#F2CC8F",marginTop:6,display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
              <span style={{opacity:0.7}}>🙋</span> {getVotes(item.id).join(", ")}
            </div>}
            <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
                <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#555"}}>~{fmtDur(item.duration||60)}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
                <PriBadge id={item.id} small />
                <Btn style={{flex:1,justifyContent:"center",fontSize:11,background:myVote(item.id)?"#F2CC8F22":"transparent",borderColor:myVote(item.id)?"#F2CC8F":"#333",color:myVote(item.id)?"#F2CC8F":"#e8e0d4"}} onClick={e=>{e.stopPropagation();toggleVote(item.id);}}>
                  {myVote(item.id)?"★":"☆"} {getVotes(item.id).length||""}
                </Btn>
                {sc ? <Btn style={{flex:1,justifyContent:"center",fontSize:11,background:"#1a1a1a",borderColor:"#81B29A",color:"#81B29A",cursor:"default"}} onClick={e=>e.stopPropagation()}>✓ {si}</Btn>
                  : <Btn style={{flex:1,justifyContent:"center",fontSize:11}} onClick={e=>{e.stopPropagation();setSched({...item,category:cat});}}>📅 Schedule</Btn>}
                <Btn style={{flex:1,justifyContent:"center",fontSize:11,color:"#E07A5F",borderColor:"#E07A5F33"}} onClick={e=>{e.stopPropagation();if(window.confirm(`Remove "${item.name}"?`))rmItem(item.id,cat);}}>✕</Btn>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ===== RENDER =====
  return (
    <div style={S.wrap}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-title">
          <span style={{fontSize:20}}>🥂</span>
          <div>
            <h1 className="hdr-label" style={{fontWeight:600,color:"#F2CC8F",lineHeight:1.2}}>Grandma's 80th Birthday</h1>
            <span className="hdr-sub">Paris Celebration · May 29 – Jun 2</span>
          </div>
        </div>
        <div className="hdr-nav">
          {connected && fmtSync() && <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#81B29A",opacity:0.8}}>{fmtSync()}</span>}
          <span onClick={()=>setShowSetup(true)} style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#81B29A",cursor:"pointer",padding:"4px 8px",borderRadius:10,border:"1px solid #81B29A33"}}>
            ⚙
          </span>
          <span onClick={()=>setShowWho(true)} style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:me?"#F2CC8F":"#E07A5F",cursor:"pointer",padding:"4px 8px",borderRadius:10,border:`1px solid ${me?"#F2CC8F33":"#E07A5F33"}`}}>
            {me?`👤 ${me}`:"👤 Who?"}
          </span>
          {ec>0 && <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#81B29A"}}>{ec} sched</span>}
          {[{k:"trip",l:"Trip Details",i:"✈"},{k:"content",l:"Explore",i:"◈"},{k:"wishlist",l:"Wishlist",i:"★"},{k:"calendar",l:"Calendar",i:"▦"}].map(n=>
            <Btn key={n.k} c={page===n.k?"gold":""} onClick={()=>setPage(n.k)}>{n.i} <span className="nav-label">{n.l}</span></Btn>
          )}
          <Btn c="coral" onClick={()=>{setGroupOpen(true);setGroupResult(null);}}>✦ <span className="nav-label">Smart Group</span></Btn>
        </div>
      </div>

      {/* ========== TRIP DETAILS ========== */}
      {page==="trip" && (
        <div className="trip-wrap">
          <div style={{textAlign:"center",padding:"44px 20px 32px"}}>
            <div className="hero-icon" style={{marginBottom:6}}>🗼</div>
            <h2 className="hero-title" style={{fontWeight:300,letterSpacing:"-0.5px",lineHeight:1.2}}>Grandma's 80<sup style={{fontSize:18}}>th</sup> Birthday</h2>
            <h3 className="hero-sub" style={{fontWeight:600,color:"#F2CC8F",marginTop:4}}>Paris Celebration</h3>
            <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#666",marginTop:10}}>Depart May 28 → Arrive May 29 → Depart Evening Jun 2</p>
            <div style={{width:60,height:1,background:"#333",margin:"20px auto 0"}} />
          </div>
          {/* TRAVELERS */}
          <div style={{marginBottom:32}}>
            <h3 className="section-title" style={{fontWeight:600,marginBottom:14}}><span style={{color:"#F2CC8F"}}>01</span> Travelers <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#555",fontWeight:400}}>({travelers.length})</span></h3>
            <div className="grid-2col">
              {["NYC","BOS"].map(g=>(<div key={g} style={S.ib}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,color:g==="NYC"?"#E07A5F":"#7B8CDE",marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>✈ From {g==="NYC"?"New York City":"Boston"}</div>
                {travelers.filter(t=>t.group===g).map(t=>(<div key={t.id} style={{fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #1a1a1a",fontSize:14}}><span style={{opacity:0.4}}>👤</span> {t.name}</div>))}
              </div>))}
            </div>
          </div>
          {/* FLIGHTS */}
          <div style={{marginBottom:32}}>
            <h3 className="section-title" style={{fontWeight:600,marginBottom:14}}><span style={{color:"#F2CC8F"}}>02</span> Flights</h3>
            {["NYC","BOS"].map(g=>(<div key={g} style={{marginBottom:14}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,color:g==="NYC"?"#E07A5F":"#7B8CDE",marginBottom:8,textTransform:"uppercase",letterSpacing:"1px"}}>{g==="NYC"?"New York City":"Boston"} Group</div>
              {flights.filter(f=>f.group===g).map(f=>(<div key={f.id} style={{...S.ib,marginBottom:8}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#F2CC8F",marginBottom:8,fontWeight:600}}>{f.dir==="outbound"?"→ Outbound":"← Return"}</div>
                <div className="grid-4col">
                  <div><div style={S.fl}>Airline</div><Input placeholder="Delta, Air France…" value={f.airline} onChange={e=>updFlight(f.id,"airline",e.target.value)} /></div>
                  <div><div style={S.fl}>Flight #</div><Input placeholder="DL123" value={f.flight} onChange={e=>updFlight(f.id,"flight",e.target.value)} /></div>
                  <div><div style={S.fl}>Depart ({f.depart})</div><Input placeholder="Time" value={f.departTime} onChange={e=>updFlight(f.id,"departTime",e.target.value)} /></div>
                  <div><div style={S.fl}>Arrive ({f.arrive})</div><Input placeholder="Time" value={f.arriveTime} onChange={e=>updFlight(f.id,"arriveTime",e.target.value)} /></div>
                </div>
                <div style={{marginTop:8}}><div style={S.fl}>Notes</div><Input placeholder="Terminal, seats, etc." value={f.notes} onChange={e=>updFlight(f.id,"notes",e.target.value)} /></div>
              </div>))}
            </div>))}
          </div>
          {/* HOTEL */}
          <div style={{marginBottom:32}}>
            <h3 className="section-title" style={{fontWeight:600,marginBottom:14}}><span style={{color:"#F2CC8F"}}>03</span> Hotel</h3>
            <div style={S.ib}>
              <div className="grid-2col" style={{gap:10}}>
                <div><div style={S.fl}>Hotel Name</div><Input placeholder="Hôtel Le Marais" value={hotel.name} onChange={e=>setHotel(p=>({...p,name:e.target.value}))} /></div>
                <div><div style={S.fl}>Confirmation #</div><Input placeholder="Booking ref" value={hotel.conf} onChange={e=>setHotel(p=>({...p,conf:e.target.value}))} /></div>
                <div style={{gridColumn:"1/-1"}}><div style={S.fl}>Address</div><Input placeholder="Full address" value={hotel.address} onChange={e=>setHotel(p=>({...p,address:e.target.value}))} /></div>
                <div><div style={S.fl}>Phone</div><Input placeholder="+33 …" value={hotel.phone} onChange={e=>setHotel(p=>({...p,phone:e.target.value}))} /></div>
                <div><div style={S.fl}>Check-in / out</div><Input value="May 29 → Jun 2" readOnly style={{color:"#777"}} /></div>
                <div style={{gridColumn:"1/-1"}}><div style={S.fl}>Notes</div><Input placeholder="Room types, requests…" value={hotel.notes} onChange={e=>setHotel(p=>({...p,notes:e.target.value}))} /></div>
              </div>
            </div>
          </div>
          {/* TRANSPORT */}
          <div style={{marginBottom:32}}>
            <h3 className="section-title" style={{fontWeight:600,marginBottom:14}}><span style={{color:"#F2CC8F"}}>04</span> Airport Transportation</h3>
            {transport.map(t=>(<div key={t.id} style={{...S.ib,marginBottom:8}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:"#ccc",marginBottom:8}}>{t.label}</div>
              <div className="grid-2col" style={{gap:8}}>
                <div><div style={S.fl}>Service / Method</div><Input placeholder="Private transfer, RER B…" value={t.details} onChange={e=>updTrans(t.id,"details",e.target.value)} /></div>
                <div><div style={S.fl}>Notes</div><Input placeholder="Booking ref, driver…" value={t.notes} onChange={e=>updTrans(t.id,"notes",e.target.value)} /></div>
              </div>
            </div>))}
          </div>
          {/* QUICK STATS */}
          <div className="grid-stats">
            {[{n:"5",l:"Nights",c:"#F2CC8F"},{n:String(travelers.length),l:"Travelers",c:"#E07A5F"},{n:String(ec),l:"Scheduled",c:"#81B29A"},{n:String(museums.length+wwii.length+misc.length),l:"Activities",c:"#7B8CDE"}].map(s=>(
              <div key={s.l} style={{textAlign:"center",padding:"14px 8px",background:"#111",borderRadius:10,border:"1px solid #1a1a1a"}}>
                <div style={{fontSize:26,fontWeight:300,color:s.c}}>{s.n}</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:"1px",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>

              return (
                <div key={meal} style={{display:"contents"}}>
                  <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,color:mealColor,padding:"10px 4px 0 0",textAlign:"right",borderTop:`1px solid ${mealColor}33`}}>{meal}</div>
                  {DAYS.map(day=>{
                    const k=`${day.key}-${mealKey}`; const ev=cal[k];
                    return (
                      <div key={k} style={{minHeight:48,borderTop:`1px solid ${mealColor}33`,padding:2,cursor:"pointer",borderRadius:3,background:ev?`${mealColor}08`:`${mealColor}04`}} onClick={()=>!ev&&setSched({prefDay:day.key,prefTime:mealKey})}>
                        {ev ? (
                          <div style={{padding:"5px 8px",borderRadius:6,fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:500,lineHeight:1.3,background:`${mealColor}18`,color:mealColor,border:`1px solid ${mealColor}33`,cursor:"pointer"}}
                            onClick={e=>{e.stopPropagation();if(window.confirm(`Remove "${ev.name}"?`))rmCal(k);}}>
                            <div style={{fontWeight:600}}>{ev.icon?`${ev.icon} `:""}{ev.name}</div>
                            {ev.area && <div style={{fontSize:9,opacity:0.7,marginTop:1}}>{ev.area}</div>}
                          </div>
                        ) : (
                          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:`${mealColor}44`,textAlign:"center",paddingTop:14}}>+ add</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {/* SEPARATOR */}
            <div style={{gridColumn:"1 / -1",height:1,background:"#333",margin:"4px 0"}} />
            {/* TIME SLOTS */}
            {TIMES.map(time=>(
              <div key={time} style={{display:"contents"}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#555",padding:"10px 4px 0 0",textAlign:"right",borderTop:"1px solid #111"}}>{time}</div>
                {DAYS.map(day=>{
                  const k=`${day.key}-${time}`; const ev=cal[k]; const cc=ev?CC[ev.category]||CC.museum:null;
                  return (
                    <div key={k} style={{minHeight:40,borderTop:"1px solid #111",padding:2,cursor:"pointer",borderRadius:3}} onClick={()=>!ev&&setSched({prefDay:day.key,prefTime:time})}>
                      {ev && (
                        <div style={{padding:"3px 6px",borderRadius:5,fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:500,lineHeight:1.3,background:cc.bg,color:cc.text,border:`1px solid ${cc.accent}33`,cursor:"pointer"}}
                          onClick={e=>{e.stopPropagation();if(window.confirm(`Remove "${ev.name}"?`))rmCal(k);}}>
                          <div style={{fontWeight:600}}>{ev.icon?`${ev.icon} `:""}{ev.name}</div>
                          {ev.duration && <div style={{fontSize:9,opacity:0.6,marginTop:1}}>~{ev.duration}min</div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
          <div className="cal-legend">
            {[{l:"Museum",c:"#F2CC8F"},{l:"WWII",c:"#E07A5F"},{l:"Experience",c:"#7B8CDE"},{l:"Restaurant",c:"#81B29A"}].map(x=>(
              <div key={x.l} style={{fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#888"}}>
                <div style={{width:10,height:10,borderRadius:3,background:x.c}} />{x.l}
              </div>
            ))}
          </div>
          <p style={{fontFamily:"'DM Sans',sans-serif",textAlign:"center",fontSize:11,color:"#444",marginTop:6}}>Click empty cells to schedule · Click events to remove</p>
        </div>
      )}

      {/* DETAIL MODAL */}
      {sel && (
        <Modal onClose={()=>setSel(null)}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <Tag color={CC[sel.category].accent}>{sel.category==="wwii"?"WWII":sel.category==="misc"?"Experience":sel.category==="restaurant"?(sel.meal||"Restaurant"):"Museum"} · {sel.area}</Tag>
              {sel.category==="restaurant" && (
                <div style={{display:"flex",gap:6,marginTop:8}}>
                  {["dinner","lunch","brunch"].map(m=>{
                    const mc=m==="dinner"?"#E07A5F":m==="brunch"?"#D4A574":"#81B29A";
                    const active=sel.meal===m;
                    return <span key={m} onClick={()=>{setRestaurants(p=>p.map(r=>r.id===sel.id?{...r,meal:m}:r));setSel(p=>({...p,meal:m}));}} style={{padding:"4px 12px",borderRadius:12,fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,cursor:"pointer",background:active?`${mc}22`:"transparent",color:active?mc:"#555",border:`1px solid ${active?mc:"#333"}`,textTransform:"uppercase",letterSpacing:"0.5px",transition:"all 0.2s"}}>{m}</span>;
                  })}
                </div>
              )}
              <h2 style={{fontSize:22,fontWeight:600,lineHeight:1.2,marginTop:6}}>{sel.icon?<span style={{marginRight:6}}>{sel.icon}</span>:null}{sel.name}</h2>
            </div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>✕</button>
          </div>
          {sel.desc && <div style={{background:"#111",borderRadius:8,padding:12,marginBottom:14}}><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#bbb",lineHeight:1.7}}>{sel.desc}</p></div>}
          {sel.travel && (<div style={{background:"#F9731611",border:"1px solid #F9731633",borderRadius:8,padding:10,marginBottom:14}}><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#F97316",fontWeight:600}}>{sel.travel}</div></div>)}
          <div className="grid-2col" style={{gap:8,marginBottom:14}}>
            {sel.hours && <div style={{background:"#111",borderRadius:8,padding:10}}><div style={S.fl}>Hours</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#ccc"}}>{sel.hours}</div></div>}
            <div style={{background:"#111",borderRadius:8,padding:10}}><div style={S.fl}>Duration</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#ccc"}}>~{sel.duration} min</div></div>
            {sel.closed && sel.closed!=="None" && <div style={{background:"#111",borderRadius:8,padding:10}}><div style={S.fl}>Closed</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#E07A5F"}}>{sel.closed}</div></div>}
            {sel.phone && <div style={{background:"#111",borderRadius:8,padding:10}}><div style={S.fl}>Phone</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#ccc"}}>{sel.phone}</div></div>}
          </div>
          {sel.tip && (<div style={{background:"#F2CC8F0a",border:"1px solid #F2CC8F33",borderRadius:8,padding:12,marginBottom:14}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#F2CC8F",textTransform:"uppercase",letterSpacing:"1px",marginBottom:3,fontWeight:600}}>💡 Insider Tip</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#ccc",lineHeight:1.6}}>{sel.tip}</div>
          </div>)}
          {isSch(sel.id)
            ? <div style={{fontFamily:"'DM Sans',sans-serif",textAlign:"center",padding:10,background:"#81B29A11",borderRadius:8,border:"1px solid #81B29A33",color:"#81B29A",fontSize:13}}>✓ Scheduled: {schInfo(sel.id)}</div>
            : <Btn c="coral" style={{width:"100%",justifyContent:"center",padding:"10px 0",fontSize:13}} onClick={()=>{setSel(null);setSched(sel);}}>+ Add to Calendar</Btn>
          }
          {getVotes(sel.id).length>0 && (
            <div style={{marginTop:10,padding:10,background:"#F2CC8F0a",border:"1px solid #F2CC8F22",borderRadius:8}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#F2CC8F",textTransform:"uppercase",letterSpacing:"1px",marginBottom:4,fontWeight:600}}>🙋 {getVotes(sel.id).length} want to do this</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{getVotes(sel.id).map(n=><span key={n} style={{fontFamily:"'DM Sans',sans-serif",display:"inline-block",padding:"2px 8px",background:"#F2CC8F15",borderRadius:8,fontSize:11,color:"#F2CC8F"}}>{n}</span>)}</div>
            </div>
          )}
          <div style={{marginTop:8}}>
            <Btn style={{width:"100%",justifyContent:"center",padding:"10px 0",fontSize:13,background:myVote(sel.id)?"#F2CC8F22":"transparent",borderColor:myVote(sel.id)?"#F2CC8F":"#333",color:myVote(sel.id)?"#F2CC8F":"#e8e0d4"}} onClick={()=>toggleVote(sel.id)}>
              {myVote(sel.id)?"★ You want to do this":"☆ I want to do this"}
            </Btn>
          </div>
          <div style={{marginTop:8}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>Priority</div>
            <div style={{display:"flex",gap:6}}>
              {Object.entries(PRI).map(([key,p])=>{
                const active = getPri(sel.id)===key;
                return <span key={key} onClick={()=>setPriorities(pr=>{if(pr[sel.id]===key){const n={...pr};delete n[sel.id];return n;}return{...pr,[sel.id]:key};})} style={{flex:1,textAlign:"center",padding:"8px 0",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,cursor:"pointer",background:active?`${p.color}22`:"#111",color:active?p.color:"#555",border:`1px solid ${active?p.color:"#333"}`,transition:"all 0.2s"}}>{p.icon} {p.label}</span>;
              })}
            </div>
          </div>
        </Modal>
      )}

      {/* SCHEDULE PICKER */}
      {sched && (
        <Modal onClose={()=>setSched(null)}>
          <h3 style={{fontSize:18,fontWeight:600,marginBottom:2}}>{sched.icon?`${sched.icon} `:""}{sched.name||"Schedule Event"}</h3>
          <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#666",marginBottom:14}}>Pick a day and time</p>
          {DAYS.map(day=>(
            <div key={day.key} style={{marginBottom:10}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:"#F2CC8F",marginBottom:5}}>{day.label}</div>
              <div style={{display:"flex",gap:4,marginBottom:4}}>
                {["lunch","dinner"].map(meal=>{
                  const k=`${day.key}-${meal}`; const taken=cal[k]; const pref=sched.prefDay===day.key&&sched.prefTime===meal;
                  const mc=meal==="lunch"?"#81B29A":"#E07A5F";
                  return <Btn key={meal} disabled={!!taken} style={{flex:1,justifyContent:"center",fontSize:11,fontWeight:600,padding:"6px 0",opacity:taken?0.25:1,background:pref?`${mc}22`:taken?`${mc}08`:"transparent",borderColor:pref?mc:taken?`${mc}33`:"#333",color:taken?`${mc}88`:mc}} onClick={()=>addCal(sched,day.key,meal)}>🍽 {meal==="lunch"?"Lunch":"Dinner"}{taken?` — ${taken.name}`:""}</Btn>;
                })}
              </div>
              <div className="sched-times">
                {TIMES.map(time=>{
                  const taken=cal[`${day.key}-${time}`]; const pref=sched.prefDay===day.key&&sched.prefTime===time;
                  return <Btn key={time} disabled={!!taken} style={{fontSize:10,padding:"3px 7px",opacity:taken?0.25:1,background:pref?"#F2CC8F22":"transparent",borderColor:pref?"#F2CC8F":"#333"}} onClick={()=>addCal(sched,day.key,time)}>{time.replace(":00 ","")}</Btn>;
                })}
              </div>
            </div>
          ))}
        </Modal>
      )}

      {/* SMART GROUPING */}
      {groupOpen && (
        <Modal onClose={()=>{setGroupOpen(false);setGroupResult(null);}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div><h3 style={{fontSize:18,fontWeight:600}}>✦ Smart Grouping</h3><p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#777",marginTop:3}}>Select activities → we group by proximity.</p></div>
            <button onClick={()=>{setGroupOpen(false);setGroupResult(null);}} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>✕</button>
          </div>
          {!groupResult ? (<>
            <div style={{maxHeight:360,overflowY:"auto",margin:"10px 0"}}>
              {[{l:"Museums",items:museums,cat:"museum",c:"#F2CC8F"},{l:"WWII",items:wwii,cat:"wwii",c:"#E07A5F"},{l:"Experiences",items:misc,cat:"misc",c:"#7B8CDE"},{l:"Restaurants",items:restaurants,cat:"restaurant",c:"#81B29A"}].filter(s=>s.items.length).map(sec=>(
                <div key={sec.l}>
                  <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,color:sec.c,marginBottom:5,marginTop:10,textTransform:"uppercase",letterSpacing:"0.5px"}}>{sec.l}</div>
                  {sec.items.map(item=>(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #111",cursor:"pointer"}}
                      onClick={()=>setGroupSel(p=>p.includes(item.id)?p.filter(x=>x!==item.id):[...p,item.id])}>
                      <div style={{width:16,height:16,border:`2px solid ${groupSel.includes(item.id)?"#F2CC8F":"#444"}`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",background:groupSel.includes(item.id)?"#F2CC8F":"transparent",flexShrink:0}}>
                        {groupSel.includes(item.id) && <span style={{color:"#0d0d0d",fontSize:11,fontWeight:700}}>✓</span>}
                      </div>
                      <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12}}>{item.icon?`${item.icon} `:""}{item.name}</span>
                      <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#555",marginLeft:"auto"}}>{item.area}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div className="group-actions">
              <Btn c="gold" style={{flex:1,justifyContent:"center",padding:"10px 0"}} onClick={genGroups}>Generate ({groupSel.length} selected)</Btn>
              <Btn onClick={()=>{
                const all=[...museums,...wwii,...misc,...restaurants].map(i=>i.id);
                setGroupSel(p=>p.length===all.length?[]:all);
              }}>{groupSel.length===[...museums,...wwii,...misc,...restaurants].length?"None":"All"}</Btn>
            </div>
          </>) : (<>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#81B29A",margin:"10px 0 12px"}}>✓ Grouped by proximity:</div>
            {groupResult.map((dg,i)=>(
              <div key={i} style={{...S.ib,marginBottom:8}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,color:"#F2CC8F",marginBottom:6}}>{dg.day.label}</div>
                {dg.items.map(item=>{
                  const cat=museums.find(m=>m.id===item.id)?"museum":wwii.find(w=>w.id===item.id)?"wwii":misc.find(x=>x.id===item.id)?"misc":"restaurant";
                  const cc=CC[cat];
                  return <div key={item.id} style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,padding:"5px 8px",marginBottom:3,borderRadius:5,background:cc.bg,color:cc.text,border:`1px solid ${cc.accent}33`}}>{item.icon?`${item.icon} `:""}{item.name} <span style={{opacity:0.5,fontSize:10,marginLeft:6}}>~{item.duration}min</span></div>;
                })}
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#555",marginTop:4}}>Total: ~{dg.items.reduce((s,i)=>s+(i.duration||60),0)} min</div>
              </div>
            ))}
            <div className="group-actions" style={{marginTop:12}}>
              <Btn c="coral" style={{flex:1,justifyContent:"center",padding:"10px 0"}} onClick={applyGroups}>Apply to Calendar →</Btn>
              <Btn onClick={()=>setGroupResult(null)}>← Back</Btn>
            </div>
          </>)}
        </Modal>
      )}

      {/* SETTINGS MODAL */}
      {showSetup && (
        <Modal onClose={()=>setShowSetup(false)}>
          <h3 style={{fontSize:20,fontWeight:600,marginBottom:16}}>⚙ Settings</h3>

          <div style={{padding:14,background:"#111",borderRadius:10,border:"1px solid #81B29A33",marginBottom:12}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:"#81B29A",marginBottom:8}}>☁ Cloud Sync</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:connected?"#81B29A":"#E07A5F",lineHeight:1.5}}>
              {connected ? "✓ Connected — all changes sync automatically across everyone's devices." : "Connecting…"}
            </div>
          </div>

          <div style={{padding:14,background:"#111",borderRadius:10,border:"1px solid #F2CC8F33"}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:"#F2CC8F",marginBottom:8}}>🔍 AI Auto-Fill</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#81B29A",lineHeight:1.5}}>
              ✓ Active — when you add a restaurant or activity, details are filled in automatically.
            </div>
          </div>
        </Modal>
      )}

      {/* WHO AM I PICKER */}
      {showWho && (
        <Modal onClose={()=>setShowWho(false)}>
          <h3 style={{fontSize:20,fontWeight:600,marginBottom:4}}>👤 Who are you?</h3>
          <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#888",marginBottom:16}}>Pick your name so your votes are tracked. This is saved on your device.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {D_TRAVELERS.map(t=>(
              <Btn key={t.id} c={me===t.name?"gold":""} style={{justifyContent:"center",padding:"12px 0",fontSize:14}} onClick={()=>pickMe(t.name)}>
                {t.name} <span style={{fontSize:10,opacity:0.6}}>({t.group})</span>
              </Btn>
            ))}
          </div>
          {me && <div style={{textAlign:"center",marginTop:12}}>
            <Btn style={{color:"#E07A5F",borderColor:"#E07A5F33",fontSize:11}} onClick={()=>{setMe("");localStorage.removeItem("paris_me");setShowWho(false);}}>Clear selection</Btn>
          </div>}
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
